<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cougar Company Data System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=12">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="logo">
    <small>40 SAR COUGAR</small>
    <h2>Data System</h2>
  </div>
  <button class="nav-btn active" data-nav="dashboard"><span>📊</span><span>Dashboard</span></button>
  <button class="nav-btn" data-nav="roster"><span>👥</span><span>Roster</span></button>
  <button class="nav-btn" data-nav="attendance"><span>📋</span><span>Attendance</span></button>
  <button class="nav-btn" data-nav="detail"><span>🔎</span><span>Detail</span></button>
  <button class="nav-btn" data-nav="medical"><span>🏥</span><span>Medical</span></button>
  <button class="nav-btn" data-nav="ippt"><span>🏃</span><span>IPPT</span></button>
  <button class="nav-btn" data-nav="rm"><span>🥾</span><span>Route March</span></button>
  <button class="nav-btn" data-nav="soc"><span>🪖</span><span>SOC</span></button>
  <button class="nav-btn" data-nav="polar"><span>⌚</span><span>Polar Flow</span></button>
  <button class="nav-btn" data-nav="sync"><span>🔄</span><span>Sync & I/O</span></button>
  <div id="sidebar-footer">
    <div id="sync-indicator">● Not synced</div>
    <div id="str-counter"></div>
  </div>
</div>

<!-- Mobile backdrop: shown when sidebar is open on phone screens; tap to close. -->
<div id="sidebar-backdrop" class="hidden"></div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <button id="mobile-nav-toggle" aria-label="Open menu">☰</button>
    <span class="topbar-search-icon">🔍</span>
    <input id="search-input" placeholder="Search 4D or Name...">
    <div id="search-results" style="display:flex;gap:4px;flex-wrap:wrap"></div>
    <button id="mobile-filter-toggle" aria-label="Open scope filter">All</button>
    <div id="topbar-filters">
      <span class="filter-label">Scope</span>
      <select id="filter-plt" class="topbar-select" title="Filter by platoon"></select>
      <select id="filter-sect" class="topbar-select" title="Filter by section"></select>
      <button id="filter-clear" class="btn btn-icon" title="Clear filter" style="display:none">✕</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!--
  Plain scripts (not modules) so this works under file:// too.
  Load order matters: state → api → helpers → render → forms → sync → main.
-->
<script src="js/state.js?v=12"></script>
<script src="js/api.js?v=12"></script>
<script src="js/helpers.js?v=12"></script>
<script src="js/render.js?v=12"></script>
<script src="js/forms.js?v=12"></script>
<script src="js/sync.js?v=12"></script>
<script src="js/main.js?v=12"></script>
</body>
</html>
